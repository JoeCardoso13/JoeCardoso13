<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }

      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }

      @keyframes progress {
        0%   { width: 16px; }
        65%  { width: 330px; }
        72%  { width: 330px; }
        73%  { width: 16px; }
        100% { width: 16px; }
      }

      @keyframes flicker {
        0%, 92%, 94%, 96%, 100% { opacity: 1; }
        93% { opacity: 0.75; }
        95% { opacity: 0.85; }
      }

      .cursor      { animation: blink 1.1s step-end infinite; }
      .bar-fill    { animation: progress 5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .screen      { animation: flicker 9s infinite; }
    </style>

    <pattern id="lines" patternUnits="userSpaceOnUse" width="520" height="4">
      <rect y="0" width="520" height="2" fill="rgba(0,0,0,0.18)"/>
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.45)"/>
    </radialGradient>
  </defs>

  <!-- Shell -->
  <rect width="520" height="200" fill="#080808" rx="10"/>

  <!-- Title bar -->
  <rect width="520" height="30" fill="#151515" rx="10"/>
  <rect y="20" width="520" height="10" fill="#151515"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="15" r="5.5" fill="#FF5F57"/>
  <circle cx="42" cy="15" r="5.5" fill="#FEBC2E"/>
  <circle cx="62" cy="15" r="5.5" fill="#28C840"/>

  <!-- Window title -->
  <text x="260" y="19" class="mono" font-size="11" fill="#39FF14" opacity="0.35" text-anchor="middle">~/projects/???  —  bash</text>

  <!-- Screen with flicker -->
  <g class="screen">
    <g filter="url(#glow)">

      <!-- Prompt line -->
      <text x="30" y="62" class="mono" font-size="12" fill="#39FF14" opacity="0.5">last login: a while ago</text>

      <!-- Big header -->
      <text x="30" y="98" class="mono" font-size="28" font-weight="bold" fill="#39FF14" letter-spacing="3">UNDER CONSTRUCTION</text>

      <!-- Progress label -->
      <text x="30" y="128" class="mono" font-size="12" fill="#39FF14" opacity="0.55">building</text>

      <!-- Progress track -->
      <rect x="30" y="138" width="376" height="12" rx="2" fill="none" stroke="#39FF14" stroke-width="1" opacity="0.25"/>
      <rect x="30" y="138" width="376" height="12" rx="2" fill="#39FF14" opacity="0.04"/>

      <!-- Progress fill (animated) -->
      <rect x="30" y="138" width="16" height="12" rx="2" fill="#39FF14" opacity="0.85" class="bar-fill"/>

      <!-- Percentage hint -->
      <text x="416" y="149" class="mono" font-size="11" fill="#39FF14" opacity="0.4">???%</text>

      <!-- Terminal prompt -->
      <text x="30" y="180" class="mono" font-size="13" fill="#39FF14" opacity="0.75">$ git status</text>

      <!-- Blinking cursor -->
      <rect x="107" y="167" width="9" height="15" fill="#39FF14" opacity="0.9" class="cursor"/>
    </g>

    <!-- Scanlines -->
    <rect width="520" height="200" fill="url(#lines)" rx="10"/>

    <!-- Vignette -->
    <rect width="520" height="200" fill="url(#vignette)" rx="10"/>
  </g>
</svg>
